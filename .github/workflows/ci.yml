name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '22'
  NEXT_PUBLIC_SUPABASE_URL: http://localhost:54321
  NEXT_PUBLIC_SUPABASE_ANON_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.test
  NEXT_PUBLIC_APP_URL: http://localhost:3000

jobs:
  lint-and-typecheck:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - run: npm ci

      - name: TypeScript
        run: npm run type-check

      - name: ESLint
        run: npm run lint

  test:
    name: Unit & Integration Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - run: npm ci

      - name: Run tests
        run: npm run test -- --run

      - name: Run tests with coverage
        if: github.event_name == 'pull_request'
        run: npm run test -- --run --coverage --coverage.reporter=text-summary

  build:
    name: Production Build
    runs-on: ubuntu-latest
    needs: [lint-and-typecheck]
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - run: npm ci

      - name: Build
        run: npm run build

  security:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - run: npm ci

      - name: npm audit
        run: npm audit --audit-level=high
        continue-on-error: true

      - name: Check for secrets in code
        run: |
          if grep -rn "eyJhbGciOiJIUzI1NiI" --include="*.ts" --include="*.tsx" --include="*.js" --include="*.env" lib/ app/ components/ 2>/dev/null; then
            echo "::error::JWT tokens found in source code"
            exit 1
          fi
          if grep -rn "re_[A-Za-z0-9]\{20,\}" --include="*.ts" --include="*.tsx" --include="*.env" lib/ app/ components/ 2>/dev/null; then
            echo "::error::Resend API keys found in source code"
            exit 1
          fi
          echo "No secrets found in source code"
